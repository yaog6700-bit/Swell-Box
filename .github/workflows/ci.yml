name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
          - goos: darwin
            goarch: arm64
            runner: macos-14
            ext: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ""
            docker_arm: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: ${{ !matrix.docker_arm }}
        with:
          go-version: "1.22.x"
          cache: true

      - name: Set up QEMU (linux/arm64 Docker)
        if: matrix.docker_arm
        uses: docker/setup-qemu-action@v3

      - name: Install Linux tray deps
        if: ${{ matrix.goos == 'linux' && !matrix.docker_arm }}
        run: |
          set -euo pipefail
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4 >/dev/null
          export DEBIAN_FRONTEND=noninteractive
          ok=0
          for i in 1 2 3 4 5; do
            echo "=== apt attempt ${i}/5 ==="
            if sudo -E apt-get update -o Acquire::Retries=5 \
              && sudo -E apt-get install -y --fix-missing \
                   libgtk-3-dev libayatana-appindicator3-dev; then
              ok=1
              break
            fi
            echo "apt failed, retrying..." >&2
            sleep $((i * 10))
          done
          if [ "$ok" != "1" ]; then
            echo "Linux tray deps install failed after retries" >&2
            exit 1
          fi

      - name: Embed Windows icon + DPI manifest
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          $rsrc = Join-Path (go env GOPATH) "bin\rsrc.exe"
          $arch = "${{ matrix.goarch }}"
          $ico = ".\internal\seed\app.ico"
          if (-not (Test-Path $ico)) { $ico = ".\internal\seed\logo.ico" }
          $manifest = ".\cmd\swellbox\app.manifest"
          if ((Test-Path $ico) -and (Test-Path $manifest)) {
            & $rsrc -manifest $manifest -ico $ico -arch $arch -o ".\cmd\swellbox\rsrc_windows_${arch}.syso"
          } elseif (Test-Path $ico) {
            & $rsrc -ico $ico -arch $arch -o ".\cmd\swellbox\rsrc_windows_${arch}.syso"
          }

      - name: Build (Docker linux/arm64)
        if: matrix.docker_arm
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Use bash -c (not -lc): login shells drop image ENV PATH so `go` disappears.
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/src -w /src \
            -e CGO_ENABLED=1 \
            -e PATH="/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            golang:1.22-bookworm \
            bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              export PATH="/usr/local/go/bin:$PATH"
              command -v go
              go version
              apt-get update
              apt-get install -y --no-install-recommends libgtk-3-dev libayatana-appindicator3-dev pkg-config
              go build -buildvcs=false -ldflags "-s -w" -o dist/Swell-Box ./cmd/swellbox
              ls -la dist/Swell-Box
            '

      - name: Build
        if: ${{ !matrix.docker_arm }}
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="-H=windowsgui -s -w"
          fi
          OUT="dist/Swell-Box${{ matrix.ext }}"
          go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/swellbox
          ls -la "$OUT"
