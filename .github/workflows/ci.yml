name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
          - goos: darwin
            goarch: arm64
            runner: macos-14
            ext: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Install Linux tray deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Embed Windows icon
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          $rsrc = Join-Path (go env GOPATH) "bin\rsrc.exe"
          $arch = "${{ matrix.goarch }}"
          if (Test-Path .\internal\seed\app.ico) {
            & $rsrc -ico .\internal\seed\app.ico -arch $arch -o ".\cmd\swellbox\rsrc_windows_${arch}.syso"
          }

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="-H=windowsgui -s -w"
          fi
          OUT="dist/SWELL-Box${{ matrix.ext }}"
          go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/swellbox
          ls -la "$OUT"
