name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build (e.g. v0.2.4). Leave empty for artifact-only."
        required: false
        default: ""
      core_channel:
        description: "sing-box channel to bundle: pre or stable"
        required: false
        default: "pre"

permissions:
  contents: write

jobs:
  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      core_channel: ${{ steps.ver.outputs.core_channel }}
    steps:
      - id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            V="${GITHUB_REF_NAME#v}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            T="${{ inputs.tag }}"
            V="${T#v}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "tag=$T" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
          CH="${{ inputs.core_channel }}"
          if [[ -z "$CH" ]]; then CH=pre; fi
          echo "core_channel=$CH" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            core_bin: sing-box.exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
            core_bin: sing-box.exe
          - goos: darwin
            goarch: arm64
            runner: macos-14
            ext: ""
            core_bin: sing-box
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            core_bin: sing-box
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: ""
            core_bin: sing-box

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Install Linux tray deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Embed Windows icon + DPI manifest
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          $rsrc = Join-Path (go env GOPATH) "bin\rsrc.exe"
          $arch = "${{ matrix.goarch }}"
          $ico = ".\internal\seed\app.ico"
          if (-not (Test-Path $ico)) { $ico = ".\internal\seed\logo.ico" }
          $manifest = ".\cmd\swellbox\app.manifest"
          if ((Test-Path $ico) -and (Test-Path $manifest)) {
            & $rsrc -manifest $manifest -ico $ico -arch $arch -o ".\cmd\swellbox\rsrc_windows_${arch}.syso"
          } elseif (Test-Path $ico) {
            & $rsrc -ico $ico -arch $arch -o ".\cmd\swellbox\rsrc_windows_${arch}.syso"
          }

      - name: Build Swell-Box
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
        run: |
          mkdir -p dist/package
          VER="${{ needs.meta.outputs.version }}"
          REPO="yaog6700-bit/Swell-Box"
          LDFLAGS="-s -w -X github.com/swell-app/swellbox/internal/update.AppVersion=${VER} -X github.com/swell-app/swellbox/internal/update.AppReleaseRepo=${REPO}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="-H=windowsgui ${LDFLAGS}"
          fi
          OUT="dist/Swell-Box${{ matrix.ext }}"
          go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/swellbox
          ls -la "$OUT"

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            chmod +x scripts/package_macos_app.sh
            ./scripts/package_macos_app.sh "$OUT" "dist/Swell-Box.app" "$VER"
            # Only ship .app inside the full zip (no separate thin client zip).
            rm -rf dist/package/*
            cp -R "dist/Swell-Box.app" dist/package/
          else
            cp "$OUT" dist/package/
          fi

      - name: Bundle official sing-box core
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CORE_BIN: ${{ matrix.core_bin }}
          CLIENT_EXT: ${{ matrix.ext }}
          CHANNEL: ${{ needs.meta.outputs.core_channel }}
          # Authenticated GitHub API avoids unauthenticated 403 / rate limits (5 matrix jobs).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then PY=python3; else PY=python; fi
          export PLATFORM="${GOOS}-${GOARCH}"
          export UA="Swell-Box-CI"
          mkdir -p dist

          gh_api() {
            local url="$1"
            local out="$2"
            local n=0
            while true; do
              n=$((n + 1))
              if curl -fsSL \
                -H "User-Agent: ${UA}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "$url" -o "$out"
              then
                return 0
              fi
              if [ "$n" -ge 5 ]; then
                echo "GitHub API failed after ${n} tries: ${url}" >&2
                return 1
              fi
              echo "GitHub API retry ${n} ..." >&2
              sleep $((n * 3))
            done
          }

          if [ "$CHANNEL" = "stable" ]; then
            gh_api "https://api.github.com/repos/SagerNet/sing-box/releases/latest" dist/rel.json
          else
            gh_api "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=20" dist/rel-list.json
            $PY scripts/ci_pick_release.py
          fi

          $PY scripts/ci_bundle_core.py
          ls -la "dist/Swell-Box-${PLATFORM}-full.zip" || true
          ls -la dist/ | head -40

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Swell-Box-${{ matrix.goos }}-${{ matrix.goarch }}
          # Release ships only offline full packages (client + core).
          path: dist/Swell-Box-${{ matrix.goos }}-${{ matrix.goarch }}-full.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [meta, build]
    if: needs.meta.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets (full.zip only)
        shell: bash
        run: |
          mkdir -p out
          find release-assets -type f -print
          # Only publish *-full.zip — no thin .exe / bare binary / thin .app zip.
          find release-assets -type f -name '*-full.zip' -exec cp -v {} out/ \;
          ls -la out/
          n=$(find out -type f -name '*-full.zip' | wc -l | tr -d ' ')
          if [ "$n" -lt 1 ]; then
            echo "no full.zip assets found" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Swell-Box ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: out/*
          body: |
            ## Swell-Box ${{ needs.meta.outputs.tag }}

            ### Downloads (offline package: client + `sing-box` core)

            | Platform | Arch | File |
            |----------|------|------|
            | Windows | amd64 | `Swell-Box-windows-amd64-full.zip` |
            | Windows | arm64 | `Swell-Box-windows-arm64-full.zip` |
            | macOS | arm64 (Apple Silicon) | `Swell-Box-darwin-arm64-full.zip` (`Swell-Box.app` inside) |
            | Linux | amd64 | `Swell-Box-linux-amd64-full.zip` |
            | Linux | arm64 | `Swell-Box-linux-arm64-full.zip` |

            Extract and run. Core is **only** inside these zips (no separate thin builds).

            ### Notes
            - User data: `~/.swellbox` (Windows: `%USERPROFILE%\.swellbox`)
            - **Windows:** run `Swell-Box.exe`
            - **macOS:** drag `Swell-Box.app` to Applications; if “damaged” → `xattr -cr Swell-Box.app`
            - **Linux:** `./Swell-Box`
            - macOS: Apple Silicon only; menu-bar app (no Dock icon)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
