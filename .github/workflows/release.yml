name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build (e.g. v0.2.4). Leave empty for artifact-only."
        required: false
        default: ""
      core_channel:
        description: "sing-box channel to bundle: pre or stable"
        required: false
        default: "pre"

permissions:
  contents: write

jobs:
  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      core_channel: ${{ steps.ver.outputs.core_channel }}
    steps:
      - id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            V="${GITHUB_REF_NAME#v}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            T="${{ inputs.tag }}"
            V="${T#v}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "tag=$T" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
          CH="${{ inputs.core_channel }}"
          if [[ -z "$CH" ]]; then CH=pre; fi
          echo "core_channel=$CH" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            core_bin: sing-box.exe
          - goos: windows
            goarch: arm64
            runner: windows-latest
            ext: .exe
            core_bin: sing-box.exe
          - goos: darwin
            goarch: arm64
            runner: macos-14
            ext: ""
            core_bin: sing-box
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            core_bin: sing-box
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: ""
            core_bin: sing-box

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Install Linux tray deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Embed Windows icon
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go install github.com/akavel/rsrc@latest
          $rsrc = Join-Path (go env GOPATH) "bin\rsrc.exe"
          $arch = "${{ matrix.goarch }}"
          if (Test-Path .\internal\seed\app.ico) {
            & $rsrc -ico .\internal\seed\app.ico -arch $arch -o ".\cmd\swellbox\rsrc_windows_${arch}.syso"
          }

      - name: Build SWELL Box
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
        run: |
          mkdir -p dist/package
          VER="${{ needs.meta.outputs.version }}"
          REPO="yaog6700-bit/Swell-box"
          LDFLAGS="-s -w -X github.com/swell-app/swellbox/internal/update.AppVersion=${VER} -X github.com/swell-app/swellbox/internal/update.AppReleaseRepo=${REPO}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="-H=windowsgui ${LDFLAGS}"
          fi
          OUT="dist/SWELL-Box${{ matrix.ext }}"
          go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/swellbox
          cp "$OUT" dist/package/
          ls -la "$OUT"

      - name: Bundle official sing-box core
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CORE_BIN: ${{ matrix.core_bin }}
          CLIENT_EXT: ${{ matrix.ext }}
          CHANNEL: ${{ needs.meta.outputs.core_channel }}
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then PY=python3; else PY=python; fi
          export PLATFORM="${GOOS}-${GOARCH}"
          export UA="SWELLBox-CI"
          mkdir -p dist

          if [ "$CHANNEL" = "stable" ]; then
            curl -fsSL -H "User-Agent: $UA" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/SagerNet/sing-box/releases/latest" -o dist/rel.json
          else
            curl -fsSL -H "User-Agent: $UA" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=20" -o dist/rel-list.json
            $PY -c "import json; arr=json.load(open('dist/rel-list.json',encoding='utf-8')); json.dump(next(x for x in arr if not x.get('draft')), open('dist/rel.json','w',encoding='utf-8'))"
          fi

          $PY scripts/ci_bundle_core.py
          ls -la "dist/SWELL-Box-${PLATFORM}-full.zip" "dist/SWELL-Box${CLIENT_EXT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SWELL-Box-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/SWELL-Box${{ matrix.ext }}
            dist/SWELL-Box-${{ matrix.goos }}-${{ matrix.goarch }}-full.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [meta, build]
    if: needs.meta.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p out
          find release-assets -type f -print
          for d in release-assets/*; do
            [ -d "$d" ] || continue
            base=$(basename "$d")
            platform=${base#SWELL-Box-}
            for f in "$d"/*; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              if [[ "$name" == *-full.zip ]]; then
                cp "$f" "out/$name"
              elif [[ "$name" == SWELL-Box.exe ]]; then
                cp "$f" "out/SWELL-Box-${platform}.exe"
              elif [[ "$name" == SWELL-Box ]]; then
                cp "$f" "out/SWELL-Box-${platform}"
              else
                cp "$f" "out/$name"
              fi
            done
          done
          ls -la out/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: SWELL Box ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: out/*
          body: |
            ## SWELL Box ${{ needs.meta.outputs.tag }}

            ### 推荐：完整离线包（内核在 zip 内，不单独发布 sing-box）

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Windows | amd64 | `SWELL-Box-windows-amd64-full.zip` |
            | Windows | arm64 | `SWELL-Box-windows-arm64-full.zip` |
            | macOS | arm64 (Apple Silicon) | `SWELL-Box-darwin-arm64-full.zip` |
            | Linux | amd64 | `SWELL-Box-linux-amd64-full.zip` |
            | Linux | arm64 | `SWELL-Box-linux-arm64-full.zip` |

            解压后同目录运行客户端；`sing-box` / `sing-box.exe` 在包内。

            ### 仅客户端（带平台标签）
            - `SWELL-Box-windows-amd64.exe` / `SWELL-Box-windows-arm64.exe`
            - `SWELL-Box-darwin-arm64`
            - `SWELL-Box-linux-amd64` / `SWELL-Box-linux-arm64`

            ### 说明
            - 用户数据：`~/.swellbox`（Windows：`%USERPROFILE%\.swellbox`）
            - 官方内核**不会**作为独立 Release 附件；只打进 `*-full.zip`
            - macOS：仅 Apple Silicon（arm64）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
